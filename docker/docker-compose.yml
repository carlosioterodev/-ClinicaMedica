services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=clinica_medica
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: clinica-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clinica_medica
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - clinica_mysql_data:/var/lib/mysql

  node:
    image: node:20-alpine
    container_name: clinica-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev"

volumes:
  clinica_mysql_data:
